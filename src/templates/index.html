<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- maximum-scale=1.0 + user-scalable=no suppresses iOS Safari's
       auto-zoom-on-focus behavior on text inputs (the 16px font-size
       fix isn't always sufficient — landscape and dynamic content can
       still trigger it). The page-view iframe is a separate document
       with its own viewport, so users can still pinch-zoom into rendered
       note content. iOS Accessibility zoom (system gesture) still works. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f23">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="notes:version" content="{{ version }}">
  <meta name="notes:deploy-date" content="{{ deploy_date }}">
  <title>Notes</title>
  <link rel="stylesheet" href="/static/notes/app.css">
  <script>window.__CHAT_API_KEY__ = {{ chat_api_key | tojson }};</script>
  <script type="importmap">
  {
    "imports": {
      "markdown-it": "https://esm.sh/markdown-it@14",
      "dompurify":   "https://esm.sh/dompurify@3"
    }
  }
  </script>
</head>
<body>
  <div class="app" id="app">
    <!-- TOP BAR ───────────────────────────────────────── -->
    <header class="topbar" id="topbar">
      <button class="topbar-btn" id="menu-btn" aria-label="Pages">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M4 6h16M4 12h16M4 18h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
      <div class="topbar-title" id="topbar-title">Notes</div>
      <button class="topbar-btn" id="new-btn" aria-label="New page">
        <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </header>

    <!-- SURFACE (chat or open page) ─────────────────── -->
    <main class="surface" id="surface">
      <div class="chat-scroll" id="chat-scroll">
        <div class="welcome" id="welcome">
          <div class="welcome-badge">
            <svg viewBox="0 0 24 24" fill="none" width="32" height="32">
              <path d="M12 2l2.5 6.5L21 10l-5 4.5L17.5 21 12 17.5 6.5 21 8 14.5 3 10l6.5-1.5L12 2z" fill="currentColor"/>
            </svg>
          </div>
          <h1>Your workspace</h1>
          <p>An AI-native alternative to Notion. Build docs, trackers, dashboards, and wikis just by describing them.</p>
          <div class="welcome-chips">
            <button class="chip" data-prompt="What's in my workspace?">What's in here?</button>
            <button class="chip" data-prompt="Create a project tracker for this week with columns Task, Owner, Status, Due">New project tracker</button>
            <button class="chip" data-prompt="Start a design doc with Background, Goals, Non-goals, Plan sections">New design doc</button>
            <button class="chip" data-prompt="Create a meeting notes page for today">Today's meeting notes</button>
          </div>
        </div>
      </div>

      <!-- PAGE VIEWER SHEET — absolutely positioned inside .surface so
           it covers the chat scroll but NOT the composer below. -->
      <aside class="sheet" id="page-sheet" aria-hidden="true">
        <header class="sheet-header">
          <button class="topbar-btn" id="sheet-back" aria-label="Back">
            <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
              <path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
          <div class="sheet-title" id="sheet-title">Page</div>
          <button class="topbar-btn" id="sheet-edit" aria-label="Edit with AI">
            <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
              <path d="M4 20h4l10-10-4-4L4 16v4z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </button>
        </header>
        <div class="sheet-meta" id="sheet-meta"></div>
        <iframe
          class="sheet-frame"
          id="sheet-frame"
          sandbox="allow-scripts allow-same-origin"
          title="page content"></iframe>
      </aside>
    </main>

    <!-- COMPOSER BAR — always at the bottom, across every surface.
         The mini-output strip above the composer shows streaming replies
         when the composer is focused or a message is in flight. -->
    <footer class="composer">
      <div class="mini-output" id="mini-output" aria-live="polite" hidden>
        <div class="mini-output-body" id="mini-output-body"></div>
        <button class="mini-output-close" id="mini-output-close" aria-label="Dismiss">
          <svg viewBox="0 0 24 24" fill="none" width="14" height="14">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="composer-row">
        <button class="composer-btn" id="mic-btn" aria-label="Voice input">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
            <rect x="9" y="3" width="6" height="12" rx="3" stroke="currentColor" stroke-width="2"/>
            <path d="M5 11a7 7 0 0014 0M12 18v3M8 21h8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
        <textarea
          id="composer-input"
          class="composer-input"
          rows="1"
          placeholder="Ask or build something… (⇧⏎ to send)"
          aria-label="Message"></textarea>
        <button class="composer-send" id="send-btn" aria-label="Send" disabled>
          <svg viewBox="0 0 24 24" fill="none" width="18" height="18">
            <path d="M4 12l16-8-6 16-2-7-8-1z" fill="currentColor"/>
          </svg>
        </button>
      </div>
    </footer>
  </div>

  <!-- PAGES DRAWER ──────────────────────────────────────── -->
  <aside class="drawer" id="pages-drawer" aria-hidden="true">
    <div class="drawer-backdrop" id="drawer-backdrop"></div>
    <div class="drawer-panel">
      <header class="drawer-header">
        <h2>Pages</h2>
        <button class="topbar-btn" id="drawer-close" aria-label="Close">
          <svg viewBox="0 0 24 24" fill="none" width="20" height="20">
            <path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </header>
      <div class="drawer-search">
        <input type="search" id="drawer-search" placeholder="Search notes…" aria-label="Search">
      </div>
      <div class="drawer-list" id="drawer-list">
        <div class="drawer-empty">Loading…</div>
      </div>
    </div>
  </aside>

  <script type="module" src="/static/notes/app.js"></script>
</body>
</html>
