services:
  notes:
    image: notes
    container_name: notes
    restart: unless-stopped
    depends_on:
      - qdrant
    environment:
      - PORT=${PORT}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-qwen3-embedding-4b}
      - EMBEDDING_DIMENSIONS=${EMBEDDING_DIMENSIONS:-1024}
      - API_KEY=${API_KEY}
      - AUTH_MODE=${AUTH_MODE:-none}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - QDRANT_URL=http://qdrant:6333
      - PAGES_DIR=/data/pages
      - DATA_DIR=/data/app
      - SESSIONS_PATH=/data/app/sessions.json
      - REQUEST_LOG_PATH=/data/app/requests.log
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ${HOME}/.notes/data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: notes-qdrant
    restart: unless-stopped
    volumes:
      - ${HOME}/.notes/qdrant:/qdrant/storage
    # no host port published — only reachable from the `notes` service
