services:
  notes:
    image: notes
    container_name: bootstrap-template
    restart: unless-stopped
    environment:
      - PORT=${PORT}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-}
      - API_KEY=${API_KEY}
      - AUTH_MODE=${AUTH_MODE:-none}
      - AUTH_PASSWORD=${AUTH_PASSWORD:-}
      - SESSIONS_PATH=/data/sessions.json
      - REQUEST_LOG_PATH=/data/requests.log
    ports:
      - "${PORT}:${PORT}"
    volumes:
      - ${HOME}/.bootstrap-template/data:/data
